<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Website bị khóa</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <div class="lock-icon">🔒</div>
    <h1>Website này đã bị khóa</h1>
    <p class="blocked-url" id="blocked-url"></p>
    <p class="desc">Nhập mật khẩu để truy cập website này</p>

    <div class="input-group">
      <input type="password" id="password-input" placeholder="Nhập mật khẩu..." autofocus />
      <button id="btn-unlock" class="btn-unlock">Mở khóa</button>
    </div>

    <p id="error-msg" class="error-msg"></p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
